services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: musikcheck
      POSTGRES_USER: musikcheck
      POSTGRES_PASSWORD: musikcheck
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://musikcheck:musikcheck@db:5432/musikcheck
    depends_on:
      - db
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  postgres_data:
