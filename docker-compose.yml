services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: musikcheck
      POSTGRES_USER: musikcheck
      POSTGRES_PASSWORD: musikcheck
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U musikcheck -d musikcheck"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://musikcheck:musikcheck@db:5432/musikcheck
      TEST_MODE: ${TEST_MODE:-true}
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY:-}
      YOUTUBE_DEFAULT_PLAYLIST: ${YOUTUBE_DEFAULT_PLAYLIST:-}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  postgres_data:
